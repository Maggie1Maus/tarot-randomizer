<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarot Randomizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1 class="title">Tarot Randomizer</h1>
    <p class="subtitle">Ziehe eine Karte und entdecke deine Botschaft.</p>
    <div class="layout">
      <section class="left-column">
        <article id="tarotCard" class="tarot-card" aria-live="polite">
          <div class="card-topline">
            <span id="drawType">Aufrecht</span>
            <span id="arcana" class="arcana-chip">Große Arkana</span>
          </div>
          <div class="card-illustration">
            <img id="cardImage" class="card-image" alt="" hidden>
            <div id="symbol" class="symbol">✦</div>
          </div>
          <div>
            <h2 id="cardName" class="card-name">Der Narr</h2>
            <p id="cardMeta" class="card-meta">Nummer 0</p>
          </div>
        </article>

        <div class="actions draw-actions">
          <button id="drawButton" type="button">Karte ziehen</button>
        </div>
      </section>

      <section class="right-column">
        <section class="panel">
          <h3 class="meaning-title">Bedeutung</h3>
          <p id="meaning" class="meaning-text">Ein neuer Zyklus beginnt. Vertraue dem ersten Schritt.</p>
        </section>

        <section class="panel ai-panel">
          <h3 class="meaning-title">Dein Fokus</h3>
          <label class="input-label" for="userContext">Worauf soll sich die KI-Deutung beziehen?</label>
          <textarea
            id="userContext"
            class="context-input"
            rows="3"
            maxlength="500"
            placeholder="z. B. Tageskarte, Beziehung, Entscheidung, berufliches Thema"
          ></textarea>
          <div class="actions ai-actions">
            <button id="interpretButton" type="button">KI-Deutung erstellen</button>
          </div>
          <p id="interpretStatus" class="interpret-status" aria-live="polite"></p>
          <section id="interpretationPanel" class="interpretation-panel" hidden>
            <h4 class="meaning-title">KI-Deutung</h4>
            <ul id="interpretationList" class="interpretation-list"></ul>
            <p id="interpretationDisclaimer" class="interpret-disclaimer"></p>
          </section>
        </section>
      </section>
    </div>
  </main>

    <script src="script.js"></script>
</body>
</html>
